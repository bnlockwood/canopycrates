<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7EED8"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8925A"/>
      <stop offset="100%" stop-color="#9A7A48"/>
    </linearGradient>
    <linearGradient id="woodSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07A42"/>
      <stop offset="100%" stop-color="#8B6B38"/>
    </linearGradient>
    <linearGradient id="chocolate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3E2510"/>
    </linearGradient>
    <linearGradient id="teaBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7A56"/>
      <stop offset="100%" stop-color="#2A5A3E"/>
    </linearGradient>
    <linearGradient id="jar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8E0D4"/>
      <stop offset="30%" stop-color="#F5F0E8"/>
      <stop offset="70%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E0D8C8"/>
    </linearGradient>
    <linearGradient id="sauceBottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4402A"/>
      <stop offset="100%" stop-color="#B03020"/>
    </linearGradient>
    <linearGradient id="honeyJar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#D4A020"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#rbg)"/>

  <!-- Shadow -->
  <ellipse cx="300" cy="370" rx="180" ry="14" fill="#D4C4B0" opacity="0.3"/>

  <!-- Wooden crate - front face -->
  <path d="M140,210 L140,360 L460,360 L460,210 Z" fill="url(#wood)" stroke="#7A6035" stroke-width="1.5"/>

  <!-- Wood grain lines (front) -->
  <g opacity="0.15">
    <line x1="140" y1="240" x2="460" y2="240" stroke="#6A5030" stroke-width="1"/>
    <line x1="140" y1="270" x2="460" y2="270" stroke="#6A5030" stroke-width="1"/>
    <line x1="140" y1="300" x2="460" y2="300" stroke="#6A5030" stroke-width="1"/>
    <line x1="140" y1="330" x2="460" y2="330" stroke="#6A5030" stroke-width="1"/>
  </g>

  <!-- Crate planks (front) -->
  <rect x="140" y="210" width="320" height="30" rx="1" fill="url(#wood)" stroke="#7A6035" stroke-width="0.5" opacity="0.9"/>
  <rect x="140" y="240" width="320" height="30" rx="1" fill="#B89058" stroke="#7A6035" stroke-width="0.5" opacity="0.5"/>
  <rect x="140" y="300" width="320" height="30" rx="1" fill="#B89058" stroke="#7A6035" stroke-width="0.5" opacity="0.3"/>

  <!-- Side of crate (3D effect) -->
  <path d="M460,210 L490,190 L490,340 L460,360 Z" fill="url(#woodSide)" stroke="#7A6035" stroke-width="1"/>
  <g opacity="0.15">
    <line x1="460" y1="240" x2="490" y2="220" stroke="#6A5030" stroke-width="1"/>
    <line x1="460" y1="270" x2="490" y2="250" stroke="#6A5030" stroke-width="1"/>
    <line x1="460" y1="300" x2="490" y2="280" stroke="#6A5030" stroke-width="1"/>
    <line x1="460" y1="330" x2="490" y2="310" stroke="#6A5030" stroke-width="1"/>
  </g>

  <!-- Crate rim (top) -->
  <path d="M135,210 L165,190 L495,190 L465,210 Z" fill="#C4A060" stroke="#7A6035" stroke-width="1"/>

  <!-- Straw/raffia fill -->
  <g opacity="0.5">
    <path d="M160,208 Q200,195 240,205 Q280,192 320,207 Q360,194 400,206 Q430,195 455,208" fill="none" stroke="#D4C090" stroke-width="3" stroke-linecap="round"/>
    <path d="M165,205 Q210,190 250,202 Q290,188 330,204 Q370,190 410,203 Q440,192 450,205" fill="none" stroke="#E0CC98" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Daintree Chocolate bar -->
  <g transform="translate(170, 110)">
    <rect x="0" y="0" width="70" height="90" rx="3" fill="url(#chocolate)" stroke="#2E1A08" stroke-width="1"/>
    <!-- Wrapper -->
    <rect x="0" y="15" width="70" height="45" fill="#2A5A3E" opacity="0.9"/>
    <rect x="5" y="20" width="60" height="3" rx="1" fill="#C4963A" opacity="0.6"/>
    <text x="35" y="40" text-anchor="middle" font-size="6" fill="#F5EDE0" font-family="serif" font-weight="bold">DAINTREE</text>
    <text x="35" y="50" text-anchor="middle" font-size="5" fill="#C4963A" font-family="serif">CHOCOLATE</text>
    <rect x="5" y="53" width="60" height="3" rx="1" fill="#C4963A" opacity="0.6"/>
    <!-- Chocolate squares visible at top -->
    <line x1="18" y1="2" x2="18" y2="14" stroke="#4A2810" stroke-width="0.5" opacity="0.5"/>
    <line x1="35" y1="2" x2="35" y2="14" stroke="#4A2810" stroke-width="0.5" opacity="0.5"/>
    <line x1="52" y1="2" x2="52" y2="14" stroke="#4A2810" stroke-width="0.5" opacity="0.5"/>
    <line x1="2" y1="8" x2="68" y2="8" stroke="#4A2810" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Daintree Tea box -->
  <g transform="translate(260, 95)">
    <rect x="0" y="0" width="55" height="75" rx="2" fill="url(#teaBox)" stroke="#0F2B1F" stroke-width="1"/>
    <!-- Label -->
    <rect x="5" y="8" width="45" height="50" rx="1" fill="#F5EDE0" opacity="0.9"/>
    <text x="27" y="22" text-anchor="middle" font-size="5" fill="#2A5A3E" font-family="serif" font-weight="bold">DAINTREE</text>
    <text x="27" y="32" text-anchor="middle" font-size="8" fill="#2A5A3E" font-family="serif" font-weight="bold">TEA</text>
    <!-- Tea leaf illustration -->
    <path d="M22,38 Q27,42 32,38 Q27,50 22,38" fill="#3A7A56" opacity="0.6"/>
    <text x="27" y="53" text-anchor="middle" font-size="3.5" fill="#6B6B6B" font-family="sans-serif">Australian Grown</text>
  </g>

  <!-- Fermented food jar (Kefir Queen) -->
  <g transform="translate(340, 115)">
    <rect x="5" y="15" width="45" height="65" rx="5" fill="url(#jar)" stroke="#C8C0B0" stroke-width="1"/>
    <!-- Lid -->
    <rect x="2" y="8" width="51" height="12" rx="4" fill="#E8E0D4" stroke="#C8C0B0" stroke-width="1"/>
    <!-- Fabric top -->
    <circle cx="27" cy="10" r="18" fill="#F5EDE0" opacity="0.3"/>
    <path d="M8,14 Q27,5 47,14" fill="none" stroke="#D4C4B0" stroke-width="1"/>
    <!-- Label -->
    <rect x="10" y="30" width="35" height="28" rx="2" fill="#FFF8F0"/>
    <text x="27" y="42" text-anchor="middle" font-size="4.5" fill="#6B3A6B" font-family="sans-serif" font-weight="bold">KEFIR</text>
    <text x="27" y="49" text-anchor="middle" font-size="4.5" fill="#6B3A6B" font-family="sans-serif" font-weight="bold">QUEEN</text>
    <!-- Contents visible through jar -->
    <rect x="8" y="60" width="39" height="15" rx="3" fill="#D4B860" opacity="0.3"/>
  </g>

  <!-- Fenglehorn sauce bottle -->
  <g transform="translate(410, 105)">
    <rect x="10" y="35" width="30" height="70" rx="4" fill="url(#sauceBottle)" stroke="#8B2018" stroke-width="1"/>
    <rect x="15" y="10" width="20" height="30" rx="3" fill="url(#sauceBottle)"/>
    <rect x="13" y="5" width="24" height="10" rx="3" fill="#8B6740"/>
    <!-- Label -->
    <rect x="13" y="48" width="24" height="22" rx="1" fill="#F5EDE0"/>
    <text x="25" y="57" text-anchor="middle" font-size="3" fill="#B03020" font-family="sans-serif" font-weight="bold">FENGLE</text>
    <text x="25" y="62" text-anchor="middle" font-size="3" fill="#B03020" font-family="sans-serif" font-weight="bold">HORN</text>
    <text x="25" y="67" text-anchor="middle" font-size="2.5" fill="#6B6B6B" font-family="sans-serif">HABANERO</text>
    <!-- Shine -->
    <rect x="32" y="38" width="2" height="30" rx="1" fill="white" opacity="0.15"/>
  </g>

  <!-- Honey jar (small) -->
  <g transform="translate(155, 145)">
    <rect x="0" y="10" width="35" height="40" rx="5" fill="url(#honeyJar)" stroke="#B08820" stroke-width="1"/>
    <rect x="5" y="0" width="25" height="14" rx="3" fill="#8B6740" stroke="#7A5A35" stroke-width="0.5"/>
    <rect x="4" y="22" width="27" height="14" rx="1" fill="#FFF8F0" opacity="0.7"/>
    <text x="17" y="32" text-anchor="middle" font-size="5" fill="#8B6740" font-family="serif" font-weight="bold">Honey</text>
  </g>

  <!-- Dried mango pieces scattered -->
  <g transform="translate(310, 175)" opacity="0.9">
    <ellipse cx="8" cy="5" rx="12" ry="6" fill="#F0A830" transform="rotate(-20)" stroke="#D08820" stroke-width="0.5"/>
    <ellipse cx="28" cy="10" rx="10" ry="5" fill="#E8A028" transform="rotate(15)" stroke="#C88018" stroke-width="0.5"/>
    <ellipse cx="15" cy="18" rx="11" ry="5" fill="#F0B030" transform="rotate(-5)" stroke="#D09020" stroke-width="0.5"/>
  </g>

  <!-- "DAINTREE" burned/stamped text on crate front -->
  <text x="300" y="290" text-anchor="middle" font-size="22" fill="#1C2B4A" font-family="serif" font-weight="bold" letter-spacing="6" opacity="0.2">CANOPY CRATES</text>
</svg>
