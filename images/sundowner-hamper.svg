<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7EED8"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <linearGradient id="swicker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A07850"/>
    </linearGradient>
    <linearGradient id="swickerDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07850"/>
      <stop offset="100%" stop-color="#8B6740"/>
    </linearGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D1A2E"/>
      <stop offset="100%" stop-color="#4A2040"/>
    </linearGradient>
    <linearGradient id="wineLabel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EDE0"/>
      <stop offset="100%" stop-color="#E8DCC8"/>
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DC8C"/>
      <stop offset="100%" stop-color="#E8C860"/>
    </linearGradient>
    <linearGradient id="grapes" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B3A6B"/>
      <stop offset="100%" stop-color="#4A2848"/>
    </linearGradient>
    <clipPath id="sbasketClip">
      <rect x="155" y="210" width="290" height="160" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#sbg)"/>

  <!-- Shadow -->
  <ellipse cx="300" cy="370" rx="165" ry="14" fill="#D4C4B0" opacity="0.3"/>

  <!-- Picnic hamper body (rectangular) -->
  <rect x="155" y="210" width="290" height="150" rx="10" fill="url(#swicker)" stroke="#8B6740" stroke-width="1.5"/>

  <!-- Wicker weave pattern -->
  <g clip-path="url(#sbasketClip)" opacity="0.25">
    <line x1="155" y1="230" x2="445" y2="230" stroke="#8B6740" stroke-width="1"/>
    <line x1="155" y1="250" x2="445" y2="250" stroke="#8B6740" stroke-width="1"/>
    <line x1="155" y1="270" x2="445" y2="270" stroke="#8B6740" stroke-width="1"/>
    <line x1="155" y1="290" x2="445" y2="290" stroke="#8B6740" stroke-width="1"/>
    <line x1="155" y1="310" x2="445" y2="310" stroke="#8B6740" stroke-width="1"/>
    <line x1="155" y1="330" x2="445" y2="330" stroke="#8B6740" stroke-width="1"/>
    <line x1="155" y1="350" x2="445" y2="350" stroke="#8B6740" stroke-width="1"/>
    <line x1="185" y1="210" x2="185" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="215" y1="210" x2="215" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="245" y1="210" x2="245" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="275" y1="210" x2="275" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="305" y1="210" x2="305" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="335" y1="210" x2="335" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="365" y1="210" x2="365" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="395" y1="210" x2="395" y2="360" stroke="#8B6740" stroke-width="1"/>
    <line x1="425" y1="210" x2="425" y2="360" stroke="#8B6740" stroke-width="1"/>
  </g>

  <!-- Hamper lid (open, tilted back) -->
  <g transform="translate(0, -5)">
    <path d="M155,215 L155,175 Q155,160 170,160 L430,160 Q445,160 445,175 L445,215" fill="url(#swickerDark)" stroke="#7A5A35" stroke-width="1.5"/>
    <!-- Lid weave -->
    <g opacity="0.2">
      <line x1="155" y1="175" x2="445" y2="175" stroke="#6A4A30" stroke-width="1"/>
      <line x1="155" y1="190" x2="445" y2="190" stroke="#6A4A30" stroke-width="1"/>
      <line x1="155" y1="205" x2="445" y2="205" stroke="#6A4A30" stroke-width="1"/>
    </g>
    <!-- Lid clasp -->
    <rect x="285" y="208" width="30" height="10" rx="3" fill="#8B6740" stroke="#7A5A35" stroke-width="1"/>
  </g>

  <!-- Linen cloth -->
  <path d="M165,210 Q200,195 240,208 Q280,195 320,208 Q360,195 400,208 Q430,195 440,210" fill="none" stroke="#FAF3E8" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Wine bottle -->
  <g transform="translate(215, 80)">
    <rect x="15" y="60" width="30" height="85" rx="4" fill="url(#wine)"/>
    <rect x="22" y="10" width="16" height="55" rx="3" fill="url(#wine)"/>
    <rect x="20" y="0" width="20" height="14" rx="3" fill="#8B6740"/>
    <!-- Foil top -->
    <rect x="19" y="8" width="22" height="8" rx="2" fill="#C4963A" opacity="0.8"/>
    <!-- Label -->
    <rect x="18" y="78" width="24" height="30" rx="2" fill="url(#wineLabel)"/>
    <line x1="22" y1="86" x2="38" y2="86" stroke="#C4956A" stroke-width="0.5"/>
    <line x1="24" y1="90" x2="36" y2="90" stroke="#C4956A" stroke-width="0.5"/>
    <line x1="22" y1="98" x2="38" y2="98" stroke="#C4956A" stroke-width="0.5"/>
    <!-- Shine -->
    <rect x="35" y="65" width="3" height="40" rx="1.5" fill="white" opacity="0.15"/>
  </g>

  <!-- Cheese wedge -->
  <g transform="translate(310, 155)">
    <path d="M0,45 L50,45 L50,20 Z" fill="url(#cheese)" stroke="#C8B050" stroke-width="1"/>
    <path d="M0,45 L50,20 L50,45 Z" fill="#E8C860" opacity="0.5"/>
    <circle cx="20" cy="38" r="3" fill="#D4B040" opacity="0.5"/>
    <circle cx="35" cy="32" r="2" fill="#D4B040" opacity="0.4"/>
    <circle cx="42" cy="40" r="2.5" fill="#D4B040" opacity="0.4"/>
    <!-- Rind -->
    <path d="M0,45 L50,45" stroke="#C8A840" stroke-width="2"/>
  </g>

  <!-- Crackers -->
  <g transform="translate(365, 170)">
    <rect x="0" y="0" width="30" height="25" rx="2" fill="#E8D4A8" stroke="#C8B488" stroke-width="0.5" transform="rotate(-5)"/>
    <rect x="5" y="-8" width="30" height="25" rx="2" fill="#F0DDB8" stroke="#D4C098" stroke-width="0.5" transform="rotate(8)"/>
    <rect x="-3" y="-5" width="30" height="25" rx="2" fill="#ECDCB0" stroke="#D0C090" stroke-width="0.5" transform="rotate(-12)"/>
    <!-- Cracker dots -->
    <circle cx="10" cy="5" r="1" fill="#C8B488" opacity="0.5"/>
    <circle cx="18" cy="8" r="1" fill="#C8B488" opacity="0.5"/>
    <circle cx="14" cy="14" r="1" fill="#C8B488" opacity="0.5"/>
  </g>

  <!-- Grapes cluster -->
  <g transform="translate(170, 150)">
    <circle cx="15" cy="30" r="7" fill="url(#grapes)"/>
    <circle cx="28" cy="28" r="7" fill="url(#grapes)"/>
    <circle cx="8" cy="22" r="7" fill="url(#grapes)"/>
    <circle cx="21" cy="20" r="7" fill="url(#grapes)"/>
    <circle cx="34" cy="22" r="7" fill="url(#grapes)"/>
    <circle cx="14" cy="14" r="7" fill="url(#grapes)"/>
    <circle cx="27" cy="13" r="7" fill="url(#grapes)"/>
    <circle cx="20" cy="6" r="6" fill="url(#grapes)"/>
    <!-- Highlights -->
    <circle cx="13" cy="28" r="2" fill="white" opacity="0.15"/>
    <circle cx="26" cy="26" r="2" fill="white" opacity="0.15"/>
    <circle cx="19" cy="18" r="2" fill="white" opacity="0.15"/>
    <!-- Stem -->
    <path d="M20,0 Q22,-8 28,-12" fill="none" stroke="#5B8C3E" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M28,-12 Q35,-10 32,-5" fill="#6B9C4E" opacity="0.7"/>
  </g>

  <!-- Hamper strap/buckle detail -->
  <rect x="280" y="275" width="40" height="6" rx="2" fill="#8B6740" stroke="#7A5A35" stroke-width="0.5"/>
</svg>
