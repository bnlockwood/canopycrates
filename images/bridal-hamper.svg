<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7EED8"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <linearGradient id="bwicker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DCC8"/>
      <stop offset="100%" stop-color="#D8C8B0"/>
    </linearGradient>
    <linearGradient id="bwickerDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8C8B0"/>
      <stop offset="100%" stop-color="#C8B898"/>
    </linearGradient>
    <linearGradient id="champagne" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D3828"/>
      <stop offset="100%" stop-color="#1E2A1A"/>
    </linearGradient>
    <linearGradient id="goldFoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C860"/>
      <stop offset="100%" stop-color="#C4963A"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C870"/>
      <stop offset="50%" stop-color="#C4963A"/>
      <stop offset="100%" stop-color="#B89020"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5C8C8"/>
      <stop offset="100%" stop-color="#E8A0A0"/>
    </linearGradient>
    <linearGradient id="bchoc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3E2510"/>
    </linearGradient>
    <clipPath id="bbasketClip">
      <path d="M160,215 Q165,350 300,360 Q435,350 440,215 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bbg)"/>

  <!-- Decorative gold dots -->
  <circle cx="90" cy="70" r="2" fill="#C4963A" opacity="0.2"/>
  <circle cx="510" cy="60" r="2" fill="#C4963A" opacity="0.2"/>
  <circle cx="70" cy="340" r="1.5" fill="#C4963A" opacity="0.15"/>
  <circle cx="530" cy="350" r="1.5" fill="#C4963A" opacity="0.15"/>
  <circle cx="150" cy="50" r="1" fill="#C4963A" opacity="0.15"/>
  <circle cx="450" cy="45" r="1" fill="#C4963A" opacity="0.15"/>

  <!-- Shadow -->
  <ellipse cx="300" cy="370" rx="160" ry="14" fill="#D4C4B0" opacity="0.25"/>

  <!-- Elegant white/cream basket body -->
  <path d="M160,215 Q165,350 300,360 Q435,350 440,215 Z" fill="url(#bwicker)" stroke="#C8B898" stroke-width="1.5"/>

  <!-- Wicker weave pattern (lighter, more elegant) -->
  <g clip-path="url(#bbasketClip)" opacity="0.15">
    <line x1="160" y1="235" x2="440" y2="235" stroke="#B8A888" stroke-width="1"/>
    <line x1="160" y1="255" x2="440" y2="255" stroke="#B8A888" stroke-width="1"/>
    <line x1="160" y1="275" x2="440" y2="275" stroke="#B8A888" stroke-width="1"/>
    <line x1="160" y1="295" x2="440" y2="295" stroke="#B8A888" stroke-width="1"/>
    <line x1="160" y1="315" x2="440" y2="315" stroke="#B8A888" stroke-width="1"/>
    <line x1="160" y1="335" x2="440" y2="335" stroke="#B8A888" stroke-width="1"/>
    <line x1="200" y1="215" x2="220" y2="360" stroke="#B8A888" stroke-width="1"/>
    <line x1="240" y1="215" x2="250" y2="360" stroke="#B8A888" stroke-width="1"/>
    <line x1="280" y1="215" x2="280" y2="360" stroke="#B8A888" stroke-width="1"/>
    <line x1="320" y1="215" x2="310" y2="360" stroke="#B8A888" stroke-width="1"/>
    <line x1="360" y1="215" x2="340" y2="360" stroke="#B8A888" stroke-width="1"/>
    <line x1="400" y1="215" x2="370" y2="360" stroke="#B8A888" stroke-width="1"/>
  </g>

  <!-- Basket rim -->
  <ellipse cx="300" cy="215" rx="142" ry="18" fill="url(#bwickerDark)" stroke="#B8A888" stroke-width="1.5"/>
  <ellipse cx="300" cy="212" rx="138" ry="15" fill="url(#bwicker)" stroke="#C8B898" stroke-width="1"/>

  <!-- Tissue paper / silk lining -->
  <path d="M175,210 Q200,190 235,208 Q270,188 300,205 Q330,188 365,208 Q400,192 430,210" fill="none" stroke="#FFF8F0" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M175,210 Q205,192 235,208 Q270,190 300,205 Q330,190 365,208 Q395,194 430,210" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Gold ribbon bow on basket -->
  <g transform="translate(285, 200)">
    <!-- Ribbon tails -->
    <path d="M15,8 Q5,30 -5,50" fill="none" stroke="url(#ribbon)" stroke-width="6" stroke-linecap="round"/>
    <path d="M15,8 Q25,30 35,50" fill="none" stroke="url(#ribbon)" stroke-width="6" stroke-linecap="round"/>
    <!-- Bow loops -->
    <path d="M15,5 Q-15,-5 -10,8 Q-5,18 15,8" fill="url(#goldFoil)" stroke="#B89020" stroke-width="0.5"/>
    <path d="M15,5 Q45,-5 40,8 Q35,18 15,8" fill="url(#goldFoil)" stroke="#B89020" stroke-width="0.5"/>
    <!-- Center knot -->
    <circle cx="15" cy="6" r="5" fill="#C4963A" stroke="#A88018" stroke-width="0.5"/>
  </g>

  <!-- Champagne/bubbly bottle -->
  <g transform="translate(200, 70)">
    <rect x="15" y="55" width="30" height="95" rx="4" fill="url(#champagne)"/>
    <rect x="20" y="15" width="20" height="45" rx="4" fill="url(#champagne)"/>
    <!-- Gold foil top -->
    <path d="M18,15 L18,0 Q18,-5 25,-5 L35,-5 Q42,-5 42,0 L42,15" fill="url(#goldFoil)" stroke="#A88018" stroke-width="0.5"/>
    <rect x="18" y="10" width="24" height="8" fill="url(#goldFoil)" stroke="#A88018" stroke-width="0.5"/>
    <!-- Wire cage -->
    <path d="M22,15 L22,25 M38,15 L38,25 M22,20 L38,20" stroke="#C4963A" stroke-width="0.5" opacity="0.6"/>
    <!-- Label -->
    <rect x="18" y="75" width="24" height="30" rx="2" fill="#F5EDE0"/>
    <text x="30" y="87" text-anchor="middle" font-size="4" fill="#C4963A" font-family="serif" font-style="italic">Bubbly</text>
    <line x1="22" y1="92" x2="38" y2="92" stroke="#E8DCC8" stroke-width="0.5"/>
    <line x1="24" y1="96" x2="36" y2="96" stroke="#E8DCC8" stroke-width="0.5"/>
    <!-- Shine -->
    <rect x="36" y="58" width="2" height="40" rx="1" fill="white" opacity="0.12"/>
  </g>

  <!-- Rose bouquet -->
  <g transform="translate(300, 95)">
    <!-- Stems -->
    <line x1="20" y1="65" x2="15" y2="100" stroke="#5B8C3E" stroke-width="2"/>
    <line x1="35" y1="60" x2="30" y2="100" stroke="#5B8C3E" stroke-width="2"/>
    <line x1="50" y1="65" x2="45" y2="100" stroke="#5B8C3E" stroke-width="2"/>
    <!-- Leaves -->
    <path d="M12,85 Q5,78 12,72 Q15,78 12,85" fill="#5B8C3E"/>
    <path d="M48,80 Q55,73 48,67 Q45,73 48,80" fill="#5B8C3E"/>
    <!-- Rose 1 -->
    <circle cx="20" cy="55" r="16" fill="url(#rose)"/>
    <path d="M15,50 Q20,42 25,50 Q20,55 15,50" fill="#F0B0B0" opacity="0.7"/>
    <path d="M12,55 Q20,48 28,55 Q20,60 12,55" fill="#E8A0A0" opacity="0.5"/>
    <circle cx="20" cy="54" r="4" fill="#F5C0C0"/>
    <!-- Rose 2 -->
    <circle cx="38" cy="48" r="14" fill="url(#rose)"/>
    <path d="M33,44 Q38,37 43,44 Q38,48 33,44" fill="#F0B0B0" opacity="0.7"/>
    <circle cx="38" cy="47" r="3.5" fill="#F5C0C0"/>
    <!-- Rose 3 -->
    <circle cx="52" cy="56" r="13" fill="url(#rose)"/>
    <path d="M47,52 Q52,46 57,52 Q52,56 47,52" fill="#F0B0B0" opacity="0.7"/>
    <circle cx="52" cy="55" r="3" fill="#F5C0C0"/>
    <!-- Baby's breath -->
    <circle cx="5" cy="50" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="8" cy="44" r="2" fill="white" opacity="0.6"/>
    <circle cx="62" cy="52" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="58" cy="45" r="2" fill="white" opacity="0.6"/>
    <circle cx="30" cy="38" r="2" fill="white" opacity="0.5"/>
  </g>

  <!-- Chocolate box -->
  <g transform="translate(380, 130)">
    <rect x="0" y="0" width="55" height="35" rx="3" fill="url(#bchoc)" stroke="#2E1A08" stroke-width="1"/>
    <!-- Gold ribbon on box -->
    <line x1="27" y1="0" x2="27" y2="35" stroke="#C4963A" stroke-width="4"/>
    <line x1="0" y1="17" x2="55" y2="17" stroke="#C4963A" stroke-width="4"/>
    <!-- Small bow -->
    <path d="M27,15 Q20,10 22,17 Q24,20 27,15" fill="#E8C860"/>
    <path d="M27,15 Q34,10 32,17 Q30,20 27,15" fill="#E8C860"/>
    <circle cx="27" cy="16" r="2" fill="#C4963A"/>
    <!-- Brand text -->
    <text x="27" y="30" text-anchor="middle" font-size="4" fill="#C4963A" font-family="serif" font-style="italic">Daintree</text>
  </g>

  <!-- Fruit (lychees cluster) -->
  <g transform="translate(150, 140)">
    <circle cx="12" cy="20" r="10" fill="#E8A0A0" stroke="#D08888" stroke-width="0.5"/>
    <circle cx="28" cy="15" r="11" fill="#F0B0A0" stroke="#D89888" stroke-width="0.5"/>
    <circle cx="20" cy="30" r="9" fill="#E8A8A0" stroke="#D09088" stroke-width="0.5"/>
    <!-- Texture dots -->
    <circle cx="10" cy="18" r="1" fill="#D09080" opacity="0.3"/>
    <circle cx="15" cy="22" r="1" fill="#D09080" opacity="0.3"/>
    <circle cx="26" cy="13" r="1" fill="#D09080" opacity="0.3"/>
    <circle cx="30" cy="18" r="1" fill="#D09080" opacity="0.3"/>
    <!-- Leaves -->
    <path d="M22,8 Q18,0 25,2 Q28,5 22,8" fill="#5B8C3E"/>
  </g>

  <!-- Basket handle (elegant, thinner) -->
  <path d="M195,212 Q195,80 300,70 Q405,80 405,212" fill="none" stroke="url(#bwickerDark)" stroke-width="10" stroke-linecap="round"/>
  <path d="M197,212 Q197,84 300,74 Q403,84 403,212" fill="none" stroke="url(#bwicker)" stroke-width="6" stroke-linecap="round"/>
</svg>
