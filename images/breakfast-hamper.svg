<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7EED8"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <linearGradient id="wicker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A07850"/>
    </linearGradient>
    <linearGradient id="wickerDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07850"/>
      <stop offset="100%" stop-color="#8B6740"/>
    </linearGradient>
    <linearGradient id="linen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF3E8"/>
      <stop offset="100%" stop-color="#F0E6D4"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#D4A020"/>
    </linearGradient>
    <linearGradient id="bread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A060"/>
      <stop offset="50%" stop-color="#C08040"/>
      <stop offset="100%" stop-color="#A06830"/>
    </linearGradient>
    <linearGradient id="avocado" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8C3E"/>
      <stop offset="100%" stop-color="#3D6B2E"/>
    </linearGradient>
    <clipPath id="basketClip">
      <path d="M160,200 Q165,340 300,350 Q435,340 440,200 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="3" fill="#E5DDD0" opacity="0.5"/>
  <circle cx="520" cy="80" r="3" fill="#E5DDD0" opacity="0.5"/>
  <circle cx="100" cy="350" r="2" fill="#E5DDD0" opacity="0.4"/>
  <circle cx="500" cy="330" r="2" fill="#E5DDD0" opacity="0.4"/>

  <!-- Shadow under basket -->
  <ellipse cx="300" cy="360" rx="160" ry="15" fill="#D4C4B0" opacity="0.3"/>

  <!-- Basket body -->
  <path d="M160,200 Q165,340 300,350 Q435,340 440,200 Z" fill="url(#wicker)" stroke="#8B6740" stroke-width="1.5"/>

  <!-- Wicker weave pattern -->
  <g clip-path="url(#basketClip)" opacity="0.3">
    <line x1="160" y1="220" x2="440" y2="220" stroke="#8B6740" stroke-width="1"/>
    <line x1="160" y1="240" x2="440" y2="240" stroke="#8B6740" stroke-width="1"/>
    <line x1="160" y1="260" x2="440" y2="260" stroke="#8B6740" stroke-width="1"/>
    <line x1="160" y1="280" x2="440" y2="280" stroke="#8B6740" stroke-width="1"/>
    <line x1="160" y1="300" x2="440" y2="300" stroke="#8B6740" stroke-width="1"/>
    <line x1="160" y1="320" x2="440" y2="320" stroke="#8B6740" stroke-width="1"/>
    <line x1="200" y1="200" x2="220" y2="350" stroke="#8B6740" stroke-width="1"/>
    <line x1="240" y1="200" x2="250" y2="350" stroke="#8B6740" stroke-width="1"/>
    <line x1="280" y1="200" x2="280" y2="350" stroke="#8B6740" stroke-width="1"/>
    <line x1="320" y1="200" x2="310" y2="350" stroke="#8B6740" stroke-width="1"/>
    <line x1="360" y1="200" x2="340" y2="350" stroke="#8B6740" stroke-width="1"/>
    <line x1="400" y1="200" x2="370" y2="350" stroke="#8B6740" stroke-width="1"/>
  </g>

  <!-- Basket rim -->
  <ellipse cx="300" cy="200" rx="142" ry="18" fill="url(#wickerDark)" stroke="#7A5A35" stroke-width="1.5"/>
  <ellipse cx="300" cy="197" rx="138" ry="15" fill="url(#wicker)" stroke="#8B6740" stroke-width="1"/>

  <!-- Linen cloth draping from basket -->
  <path d="M175,195 Q200,175 230,190 Q260,170 290,188 Q310,172 340,190 Q370,175 400,192 Q420,180 435,195" fill="none" stroke="#F0E6D4" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <path d="M175,195 Q200,178 230,190 Q260,173 290,188 Q310,175 340,190 Q370,178 400,192 Q420,183 435,195" fill="none" stroke="#FAF3E8" stroke-width="8" stroke-linecap="round"/>

  <!-- Bread loaf -->
  <g transform="translate(210, 120)">
    <ellipse cx="45" cy="55" rx="50" ry="30" fill="url(#bread)"/>
    <path d="M0,45 Q45,5 90,45" fill="#D4A060" stroke="#B08040" stroke-width="0.5"/>
    <path d="M20,35 Q45,15 70,35" fill="none" stroke="#A06830" stroke-width="1" opacity="0.4"/>
    <path d="M30,30 Q45,20 60,30" fill="none" stroke="#A06830" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Honey jar -->
  <g transform="translate(330, 130)">
    <rect x="5" y="15" width="50" height="55" rx="6" fill="url(#honey)" stroke="#B08820" stroke-width="1"/>
    <rect x="12" y="0" width="36" height="18" rx="3" fill="#8B6740" stroke="#7A5A35" stroke-width="1"/>
    <rect x="15" y="28" width="30" height="18" rx="2" fill="#FFF8F0" opacity="0.7"/>
    <text x="30" y="41" text-anchor="middle" font-size="7" fill="#8B6740" font-family="serif" font-weight="bold">HONEY</text>
    <!-- Dipper -->
    <line x1="35" y1="2" x2="45" y2="-15" stroke="#C4956A" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="47" cy="-18" rx="7" ry="5" fill="#C4956A" stroke="#A07850" stroke-width="0.5"/>
  </g>

  <!-- Avocado -->
  <g transform="translate(265, 155)">
    <ellipse cx="22" cy="25" rx="22" ry="28" fill="url(#avocado)"/>
    <ellipse cx="22" cy="22" rx="18" ry="22" fill="#6B9C4E" opacity="0.4"/>
    <path d="M22,0 Q18,5 22,8 Q26,5 22,0" fill="#3D6B2E"/>
  </g>

  <!-- Mango -->
  <g transform="translate(180, 155)">
    <ellipse cx="20" cy="20" rx="22" ry="18" fill="#F0A030" transform="rotate(-15, 20, 20)"/>
    <ellipse cx="18" cy="17" rx="15" ry="12" fill="#F5B840" opacity="0.5" transform="rotate(-15, 20, 20)"/>
    <path d="M38,10 Q42,5 40,2" fill="none" stroke="#8B6740" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Basket handle -->
  <path d="M190,197 Q190,70 300,60 Q410,70 410,197" fill="none" stroke="url(#wickerDark)" stroke-width="12" stroke-linecap="round"/>
  <path d="M192,197 Q192,74 300,64 Q408,74 408,197" fill="none" stroke="url(#wicker)" stroke-width="8" stroke-linecap="round"/>
</svg>
