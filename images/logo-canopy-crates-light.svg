<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="goldRingL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A84A"/>
      <stop offset="50%" stop-color="#C4963A"/>
      <stop offset="100%" stop-color="#B08530"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <circle cx="52" cy="56" r="28" fill="none" stroke="url(#goldRingL)" stroke-width="3"/>
  <!-- Globe lines -->
  <ellipse cx="52" cy="56" rx="14" ry="28" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.2"/>
  <line x1="24" y1="56" x2="80" y2="56" stroke="#FFFFFF" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="52" cy="46" rx="24" ry="8" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.12"/>
  <ellipse cx="52" cy="66" rx="24" ry="8" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.12"/>

  <!-- Palm tree trunk -->
  <path d="M52,82 Q50,65 48,50 Q47,42 50,35" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Palm fronds - left -->
  <path d="M49,36 Q30,22 18,28" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M49,36 Q28,28 15,36" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M49,36 Q32,34 22,44" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Palm fronds - right -->
  <path d="M50,35 Q68,20 82,24" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M50,35 Q72,26 86,32" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M50,35 Q70,32 82,40" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Small fronds -->
  <path d="M49,37 Q40,40 34,50" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M51,37 Q60,42 66,50" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- CANOPY wordmark -->
  <text x="112" y="52" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="700" fill="#FFFFFF" letter-spacing="4">CANOPY</text>

  <!-- CRATES sub-label -->
  <text x="114" y="78" font-family="'Montserrat', 'Arial', sans-serif" font-size="18" font-weight="600" fill="#C4963A" letter-spacing="12">CRATES</text>

  <!-- Gold accent line -->
  <line x1="112" y1="58" x2="340" y2="58" stroke="#C4963A" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="112" y="100" font-family="'Playfair Display', Georgia, serif" font-size="10" font-style="italic" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">A sense of place. A world of discovery.</text>
</svg>
